<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background: Dark Circle for contrast on light tabs -->
  <circle cx="50" cy="50" r="48" fill="#0f172a" />
  
  <!-- Symbol: The Crowned 'K' (Centered) -->
  <g transform="translate(22, 18) scale(0.6)">
    <!-- Main K Spine -->
    <path d="M20 0 L50 0 L40 100 L10 100 Z" fill="#ffffff" filter="url(#dropShadow)" />
    <!-- Upper Wing -->
    <path d="M50 45 L90 0 L120 10 L80 60 Z" fill="#ffffff" filter="url(#dropShadow)" />
    <!-- Lower Leg -->
    <path d="M50 55 L90 100 L120 100 L80 50 Z" fill="#ffffff" filter="url(#dropShadow)" />
    <!-- Accent -->
    <path d="M55 45 L75 50 L55 55 Z" fill="#8b5cf6" />
  </g>
</svg>
